# Shared defaults for the MLEngineering backend (spring.application.name=ml-from-scratch).
server.port=${SERVER_PORT:8080}

# Don't crash the whole app at boot if the DB is briefly unreachable; the
# /api/db-test endpoint surfaces the error instead.
spring.datasource.hikari.initialization-fail-timeout=-1

# Health endpoint only (used by smoke checks / container healthchecks).
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
