# Shared defaults for the lottery backend (spring.application.name=lottery-backend).

# --- Datasource (Postgres) ---
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/lottery}
spring.datasource.username=${POSTGRES_USER:lottery}
spring.datasource.password=${POSTGRES_PASSWORD:lottery}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- JSON serialization ---
spring.jackson.default-property-inclusion=non_null

# --- Application security (real values via env; defaults are non-secret placeholders) ---
app.admin.email=${ADMIN_EMAIL:admin@example.com}
app.admin.password=${ADMIN_PASSWORD:changeme}
app.admin.jwt-secret=${ADMIN_JWT_SECRET:change-me-in-prod-please-use-a-32+byte-secret!!}
app.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}

# CORS origin for the React dev server.
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

# --- Actuator (health checks only) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# --- Graceful shutdown ---
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
