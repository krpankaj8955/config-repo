# Production profile. All secrets/connection details MUST come from env vars;
# intentionally NO insecure defaults, so the app fails fast if something's missing.

# --- Datasource (PostgreSQL) ---
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Connection pool ---
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- Application security (required via env) ---
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.jwt-secret=${ADMIN_JWT_SECRET}
app.google.client-id=${GOOGLE_CLIENT_ID}
app.frontend.origin=${FRONTEND_ORIGIN}

# No demo data in production.
app.seed-demo-data=false

# --- Hardening ---
server.error.include-message=never
server.error.include-stacktrace=never
logging.level.org.hibernate.SQL=warn
logging.level.org.springframework.web=warn
